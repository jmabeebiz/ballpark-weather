<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#2d6ab4"/>
    </linearGradient>

    <!-- Baseball gradient - gives it dimension -->
    <radialGradient id="ballGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f0ede8"/>
      <stop offset="100%" stop-color="#d8d2c8"/>
    </radialGradient>

    <!-- Baseball shadow -->
    <radialGradient id="ballShadow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </radialGradient>

    <!-- Cloud gradient -->
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dce8f5"/>
    </linearGradient>

    <!-- Drop shadow filter for cloud -->
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0a1f4a" flood-opacity="0.3"/>
    </filter>

    <!-- Drop shadow filter for ball -->
    <filter id="ballShadowFilter" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0a1f4a" flood-opacity="0.4"/>
    </filter>

    <!-- Rounded rect clip -->
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Subtle background texture — lighter patch upper area -->
    <radialGradient id="bgGlow" cx="50%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#3a7fd4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a3a6b" stop-opacity="0"/>
    </radialGradient>
    <rect width="1024" height="1024" fill="url(#bgGlow)"/>

    <!-- ── Baseball ── -->
    <g filter="url(#ballShadowFilter)">
      <!-- Ball body -->
      <circle cx="512" cy="650" r="290" fill="url(#ballGrad)"/>
      <!-- Ball edge shading -->
      <circle cx="512" cy="650" r="290" fill="url(#ballShadow)"/>

      <!-- Baseball stitching - left seam (classic curved C shape) -->
      <g fill="none" stroke="#cc2222" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
        <!-- Left seam curve -->
        <path d="M 340 480 C 300 530, 295 580, 300 630 C 305 680, 320 720, 350 760"/>
        <!-- Left stitch marks -->
        <line x1="337" y1="493" x2="318" y2="484"/>
        <line x1="325" y1="516" x2="305" y2="510"/>
        <line x1="314" y1="540" x2="294" y2="537"/>
        <line x1="306" y1="564" x2="286" y2="564"/>
        <line x1="300" y1="589" x2="280" y2="591"/>
        <line x1="298" y1="614" x2="278" y2="619"/>
        <line x1="299" y1="639" x2="279" y2="646"/>
        <line x1="303" y1="663" x2="284" y2="672"/>
        <line x1="311" y1="687" x2="293" y2="698"/>
        <line x1="323" y1="709" x2="307" y2="722"/>
        <line x1="338" y1="730" x2="324" y2="745"/>

        <!-- Right seam curve -->
        <path d="M 684 480 C 724 530, 729 580, 724 630 C 719 680, 704 720, 674 760"/>
        <!-- Right stitch marks -->
        <line x1="687" y1="493" x2="706" y2="484"/>
        <line x1="699" y1="516" x2="719" y2="510"/>
        <line x1="710" y1="540" x2="730" y2="537"/>
        <line x1="718" y1="564" x2="738" y2="564"/>
        <line x1="724" y1="589" x2="744" y2="591"/>
        <line x1="726" y1="614" x2="746" y2="619"/>
        <line x1="725" y1="639" x2="745" y2="646"/>
        <line x1="721" y1="663" x2="740" y2="672"/>
        <line x1="713" y1="687" x2="731" y2="698"/>
        <line x1="701" y1="709" x2="717" y2="722"/>
        <line x1="686" y1="730" x2="700" y2="745"/>
      </g>

      <!-- Subtle highlight on ball -->
      <ellipse cx="430" cy="555" rx="90" ry="60" fill="white" opacity="0.18" transform="rotate(-20 430 555)"/>
    </g>

    <!-- ── Cloud ── -->
    <g filter="url(#cloudShadow)">
      <!-- Cloud body — built from overlapping circles -->
      <circle cx="390" cy="308" r="95"  fill="url(#cloudGrad)"/>
      <circle cx="468" cy="268" r="115" fill="url(#cloudGrad)"/>
      <circle cx="562" cy="260" r="108" fill="url(#cloudGrad)"/>
      <circle cx="648" cy="295" r="88"  fill="url(#cloudGrad)"/>
      <!-- Cloud base fill to smooth bottom -->
      <rect x="300" y="310" width="425" height="90" fill="url(#cloudGrad)"/>
      <!-- Cloud base curve -->
      <ellipse cx="512" cy="390" rx="215" ry="30" fill="url(#cloudGrad)"/>
    </g>

    <!-- ── Rain drops ── -->
    <!-- Drop shape: slightly tapered teardrop -->
    <g fill="#7ab8e8" opacity="0.9">
      <!-- Drop 1 -->
      <path d="M 404 445 Q 398 462 404 478 Q 410 462 404 445 Z"/>
      <!-- Drop 2 -->
      <path d="M 452 458 Q 446 478 452 496 Q 458 478 452 458 Z"/>
      <!-- Drop 3 -->
      <path d="M 500 448 Q 494 468 500 486 Q 506 468 500 448 Z"/>
      <!-- Drop 4 -->
      <path d="M 548 460 Q 542 480 548 498 Q 554 480 548 460 Z"/>
      <!-- Drop 5 -->
      <path d="M 596 448 Q 590 468 596 486 Q 602 468 596 448 Z"/>
      <!-- Drop 6 — second row, offset -->
      <path d="M 428 498 Q 422 518 428 536 Q 434 518 428 498 Z"/>
      <path d="M 524 502 Q 518 522 524 540 Q 530 522 524 502 Z"/>
      <path d="M 572 492 Q 566 512 572 530 Q 578 512 572 492 Z"/>
    </g>

  </g>
</svg>
